<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Safari Web App Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A-Level Prep">
    
    <!-- Generates a simple graduation cap icon for the Home Screen -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%234f46e5%22/><text y=%22.9em%22 font-size=%2280%22>🎓</text></svg>">

    <title>Exam Practice Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            /* Extra padding at top for iOS notch */
            padding-top: env(safe-area-inset-top); 
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* Custom scrollbar for a native app feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased text-slate-800 pb-16">

    <!-- App Header -->
    <header class="pt-8 pb-8 px-4 sm:px-6 lg:px-8 text-center sticky top-0 bg-[#f8fafc]/90 backdrop-blur-md z-10 border-b border-slate-200">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">
            Exam Prep 2027
        </h1>
        <p class="mt-2 text-sm text-slate-600 font-medium">
            Countdown to May 28th
        </p>
    </header>

    <!-- Timetable Grid -->
    <main class="max-w-2xl mx-auto px-4 sm:px-6 mt-8">
        <div id="schedule-container" class="space-y-4"></div>
    </main>

    <script>
        // Generated list prioritizing Paper 1s before the May 28th / June 7th exams
        const examPracticeData = [
            { week: "Week 1", dates: "Apr 5 - Apr 11", tasks: ["Chem P1: Specimen, 2017", "Bio P1: Specimen, 2017", "Chem P2: Specimen", "Bio P2: Specimen"] },
            { week: "Week 2", dates: "Apr 12 - Apr 18", tasks: ["Chem P1: 2018, 2019", "Bio P1: 2018, 2019", "Chem P3: Specimen", "Bio P3: Specimen"] },
            { week: "Week 3", dates: "Apr 19 - Apr 25", tasks: ["Chem P1: 2020, 2021", "Bio P1: 2020, 2021", "Chem P2: 2017", "Bio P2: 2017"] },
            { week: "Week 4", dates: "Apr 26 - May 2", tasks: ["Chem P1: 2022, 2023", "Bio P1: 2022, 2023", "Chem P3: 2017", "Bio P3: 2017"] },
            { week: "Week 5", dates: "May 3 - May 9", tasks: ["Chem P1: 2024 (FINAL P1)", "Bio P1: 2024 (FINAL P1)", "Chem P2: 2018, 2019", "Bio P2: 2018, 2019"] },
            { week: "Week 6", dates: "May 10 - May 16", tasks: ["Chem P3: 2018, 2019", "Bio P3: 2018, 2019", "Chem P2: 2020", "Bio P2: 2020"] },
            { week: "Week 7", dates: "May 17 - May 23", tasks: ["Review Chem P1 Mistakes", "Chem P3: 2020", "Bio P3: 2020", "Chem P2: 2021, 2022"] },
            { week: "Week 8", dates: "May 24 - May 30", isExamWeek: true, exam: "🚨 May 28: Chemistry Paper 1", tasks: ["Bio P2: 2021, 2022", "Chem P3: 2021, 2022", "Review Bio P1 Mistakes"] },
            { week: "Week 9", dates: "May 31 - Jun 6", isExamWeek: true, exam: "🚨 Jun 7: Biology Paper 1", tasks: ["Chem P2: 2023, 2024 (FINAL P2)", "Bio P2: 2023, 2024 (FINAL P2)", "Chem P3: 2023"] },
            { week: "Week 10", dates: "Jun 7 - Jun 13", isExamWeek: true, exam: "🚨 Jun 10: Chemistry Paper 2", tasks: ["Bio P3: 2023", "Chem P3: 2024 (FINAL P3)", "Review Chem P2 & Bio P2 Mistakes"] },
            { week: "Week 11", dates: "Jun 14 - Jun 20", isExamWeek: true, exam: "🚨 Jun 14: Bio P2 | Jun 17: Chem P3 | Jun 18: Bio P3", tasks: ["Bio P3: 2024 (FINAL P3)", "Final Light Review"] }
        ];

        const container = document.getElementById('schedule-container');

        examPracticeData.forEach((item) => {
            const isExam = item.isExamWeek;
            
            let tasksHtml = item.tasks.map(task => `
                <li class="flex items-start mb-2">
                    <input type="checkbox" class="mt-1 w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer">
                    <span class="ml-3 text-sm text-slate-700">${task}</span>
                </li>
            `).join('');

            const examBanner = isExam ? `
                <div class="mt-3 mb-2 bg-rose-50 text-rose-700 text-xs font-bold px-3 py-2 rounded-lg border border-rose-100 uppercase tracking-wide">
                    ${item.exam}
                </div>
            ` : '';

            const cardHTML = `
                <div class="glass-card rounded-2xl shadow-sm border ${isExam ? 'border-rose-200 shadow-rose-100/50' : 'border-slate-200/60'} p-5">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-slate-900">${item.week}</h3>
                        <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md">${item.dates}</span>
                    </div>
                    ${examBanner}
                    <ul class="mt-3">
                        ${tasksHtml}
                    </ul>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
